<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Plugin Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f2ef;
      color: #1d2226;
      padding: 24px;
      max-width: 520px;
      margin: 0 auto;
    }
    h1 { font-size: 18px; color: #0a66c2; margin-bottom: 20px; }
    h2 { font-size: 14px; color: #666; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    input[type="text"], input[type="number"], input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #0a66c2; }
    .hint { font-size: 11px; color: #999; margin: -8px 0 12px; }
    button[type="submit"] {
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 8px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button[type="submit"]:hover { background: #004182; }
    #save-status { margin-left: 12px; color: #057642; font-size: 13px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>LinkedIn Recruiter Plugin Settings</h1>

  <form id="options-form">
    <h2>Connection</h2>
    <label for="webhook-url">Webhook URL</label>
    <input type="text" id="webhook-url" placeholder="http://localhost:8000">

    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="Your secret API key">

    <h2>Job Criteria</h2>
    <label for="min-seniority">Minimum Seniority</label>
    <input type="text" id="min-seniority" placeholder="senior">

    <label for="preferred-tech">Preferred Tech Stack</label>
    <input type="text" id="preferred-tech" placeholder="Go, Rust, Backend">
    <p class="hint">Comma-separated list</p>

    <label for="avoid-keywords">Avoid Keywords</label>
    <input type="text" id="avoid-keywords" placeholder="PHP, WordPress, Frontend-only">
    <p class="hint">Comma-separated list</p>

    <label for="locations">Locations</label>
    <input type="text" id="locations" placeholder="Remote, Charlotte, NC">
    <p class="hint">Comma-separated list</p>

    <label for="min-compensation">Minimum Base Compensation ($)</label>
    <input type="number" id="min-compensation" placeholder="200000">

    <div>
      <button type="submit">Save Settings</button>
      <span id="save-status"></span>
    </div>
  </form>

  <script type="module" src="options.ts"></script>
</body>
</html>
